# GPU override. Requires the full model image: extend Dockerfile to install a CUDA
# torch build and COPY the neiro_model/ checkpoints (see Dockerfile comment).
# Without those, the base image still runs — the classifier adapters just report
# "unavailable" — so GPU inference is a no-op until the models are packaged in.
services:
  ml-service:
    environment:
      ML_VIDEO_DEVICE: auto
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
