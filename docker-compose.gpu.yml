# GPU override. Requires a CUDA torch build in the image (see Dockerfile
# comment). Without it the base image still runs on CPU, so GPU inference is a
# no-op until the CUDA wheels are packaged in.
services:
  ml-service:
    environment:
      ML_ASR_DEVICE: cuda
      ML_ASR_COMPUTE_TYPE: float16
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
