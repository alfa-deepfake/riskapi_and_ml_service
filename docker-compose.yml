services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    # Host ports are overridable for shared/busy hosts via env or a local .env, e.g.
    #   RISK_API_PORT=8001 MONGO_PORT=27018 docker compose up
    # Internal service-to-service ports never change, so ml->risk stays wired.
    # NB: changing ML_PORT also means editing frontend/config.js (browser URL) AND
    # rebuilding the frontend image — config.js is COPYed into it at build time.
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      ml-service:
        condition: service_started

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    # All model weights live on the host, never in the image. The InsightFace
    # cache uses its standard root so train/face_crop.py loads buffalo_l without
    # a runtime download.
    volumes:
      - ./models:/app/models:ro
      - ./models/insightface:/root/.insightface:ro
    environment:
      ML_SERVICE_NAME: alpha-bank-anti-deepfake-ml
      RISK_API_URL: http://risk-api:8000
      ML_ENABLE_RISK_API_CALLBACKS: "true"
      ML_DECISION_ALLOW_THRESHOLD: "0.35"
      ML_DECISION_DENY_THRESHOLD: "0.72"
      ML_CORS_ORIGINS: "*"
      ML_CHALLENGE_TTL_SECONDS: "900"
    ports:
      - "${ML_PORT:-8100}:8100"
    depends_on:
      risk-api:
        condition: service_started

  risk-api:
    build:
      context: ../deepfake-riskapi
      dockerfile: ../riskapi_and_ml_service/risk_api.Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: deepfake
    ports:
      - "${RISK_API_PORT:-8000}:8000"
    depends_on:
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
